<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Tablet shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">   
                        <a class="nav-link active" href="index.html">Trang Chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#products-section">Sản Phẩm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about-section">Giới Thiệu</a>
                    </li> 
                    <li class="nav-item">
                        <a class="nav-link" href="#contact-section">Liên Hệ</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="#" class="btn btn-accent rounded-pill px-4 shadow-sm text-dark-blue d-flex align-items-center">
                            <i class="bi bi-cart3 me-2"></i> Giỏ Hàng
                        </a>
                    </li>   
                </ul>
            </div>
        </div>
    </nav>

    <!-- product item -->
    <div class="container my-5">
        <h2 class="fw-bold mb-4 text-center" style="color:#0d1b3e">Bảng vẽ không màn hình</h2>
        <div class="row g-4" id="product-list"></div>
    </div>
    
    <template id="product-template">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card product-card">
        <img class="product-img w-100" src="" alt="">
        <div class="card-body">
            <span class="badge badge-model text-white mb-2 d-inline-block"></span>
            <h5 class="product-title"></h5>
            <p class="text-muted small mb-3 product-desc"></p>
            <hr>
            <div class="d-flex justify-content-between align-items-center">
                <span class="product-price price-tag"></span>
                <a class="btn btn-black" href="#" onclick="goDetail(this); return false;">Chi tiết</a>
            </div>
        </div>
    </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        renderProducts(products);
    </script>
</body>
</html>
