<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title lang="vi">OpenTablet shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/icon.ico" type="image/x-icon">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Open<span style="color:#db34d3">Tablet</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <form class="d-flex ms-lg-4 me-lg-3 my-3 my-lg-0 flex-grow-1" role="search" id="product-search-form">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0 text-muted"><i class="bi bi-search"></i></span>
                        <input type="search" class="form-control border-0 shadow-none" id="product-search" placeholder="Tìm kiếm sản phẩm..." aria-label="Tìm kiếm sản phẩm">
                    </div>
                </form>
                <ul class="navbar-nav mb-2 mb-lg-0 align-items-center ms-lg-auto">
                    <li class="nav-item">   
                        <a class="nav-link active" href="index.html">Trang Chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#products-section">Sản Phẩm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="html/gioi-thieu.html">Giới Thiệu</a>
                    </li> 
                    <!-- <li class="nav-item">
                        <a class="nav-link" href="#contact-section">Liên Hệ</a>
                    </li> -->
                    <li class="nav-item ms-lg-3">
                        <a href="html/giohang.html" class="btn btn-accent rounded-pill px-4 shadow-sm text-dark-blue d-flex align-items-center">
                            <i class="bi bi-cart3 me-2"></i> Giỏ Hàng
                        </a>
                    </li>   
                    <li class="nav-item ms-lg-3">
                        <a href="html/login.html" class="btn btn-accent rounded-pill px-4 shadow-sm text-dark-blue d-flex align-items-center">
                            <i class="bi bi-person"></i> Đăng Nhập
                        </a>
                    </li>   
                </ul>
            </div>
        </div>
    </nav>

    <section class="d-flex align-items-center bg-dark text-white text-center position-relative overflow-hidden shadow-sm" style="height: 35vh;">
        <div class="position-absolute top-0 start-0 w-100 h-100 opacity-10" style="pointer-events: none;">
            <img src="assets/test-bg2.jpg" alt="Banner Background" id="banner-img" class="w-100 h-100 object-fit-cover">
        </div>

        <div class="position-absolute top-0 start-0 w-100 h-100" 
            style="background-color: rgba(0, 0, 0, 0.5); z-index: 1; pointer-events: none;">
        </div>

        <div class="container py-5 position-relative z-1 animate-fade-in">
            <h1 class="display-3 fw-bold text-white mb-3" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">OpenTablet</h1>
            <p class="lead text-light mb-4 mx-auto" style="max-width: 600px; font-size: 1.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">Chuyên cung cấp các bảng vẽ kỹ thuật số và công cụ cho các họa sĩ tốt nhất Việt Nam.</p>
        </div>
    </section>
    
    <!-- product area -->
    <main class="py-5">
        <div class="container mb-5">
        <div class="d-flex justify-content-center align-items-center gap-2">
            <label for="product-filter" class="fw-bold fs-5" style="color:#250f2a">
                <i class="bi bi-funnel-fill"></i> Lọc theo nhu cầu:
            </label>
            <select class="form-select w-auto fw-semibold ms-lg-auto" id="product-filter" style="border-color: #0d1b3e; color: #0d1b3e;">
                <option value="all" selected>Tất cả (Mặc định)</option>
                <option value="osu">Dành cho người chơi osu!</option>
                <option value="education">Học tập - Giảng dạy</option>
                <option value="professional">Chuyên nghiệp - Bán chuyên</option>
            </select>
        </div>
    </div>
        <div class="container my-5" id="products-section">
            <h2 class="fw-bold mb-4 text-center" style="color:#0d1b3e">Bảng vẽ không màn hình</h2>
            <div class="row g-4" id="no-screen-list"></div>
        </div>

        <div class="container my-5">
            <h2 class="fw-bold mb-4 text-center" style="color:#0d1b3e">Bảng vẽ có màn hình</h2>
            <div class="row g-4" id="screen-list"></div>
        </div>
    </main>

    <template id="product-template">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card product-card">
        <img class="product-img w-100" src="" alt="">
        <div class="card-body">
            <span class="badge badge-model text-white mb-2 d-inline-block"></span>
            <h5 class="product-title"></h5>
            <p class="text-muted small mb-3 product-desc"></p>
            <hr>
            <div class="d-flex justify-content-between align-items-center">
                <span class="product-price price-tag"></span>
                <a class="btn btn-black" href="#" onclick="goDetail(this); return false;">Chi tiết</a>
            </div>
        </div>
    </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
    <script src="js/img-change.js"></script>
</body>
</html>
