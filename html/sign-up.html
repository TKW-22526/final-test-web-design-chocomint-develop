<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title lang="vi">OpenTablet shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../assets/icon.ico" type="image/x-icon">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Open<span style="color:#db34d3">Tablet</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mb-2 mb-lg-0 align-items-center ms-lg-auto">
                    <li class="nav-item">   
                        <a class="nav-link active" href="../index.html">Trang Chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#products-section">Sản Phẩm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#about-section">Giới Thiệu</a>
                    </li> 
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#contact-section">Liên Hệ</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="#" class="btn btn-accent rounded-pill px-4 shadow-sm text-dark-blue d-flex align-items-center">
                            <i class="bi bi-cart3 me-2"></i> Giỏ Hàng
                        </a>
                    </li>   
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <span class="badge rounded-pill text-bg-dark px-3 py-2 mb-3">Đăng ký</span>
                                <h1 class="h3 fw-bold text-dark mb-2">Tạo tài khoản mới</h1>
                                <p class="text-secondary mb-0">Biểu mẫu này dùng đúng logic trong <span class="fw-semibold">js/script.js</span>.</p>
                            </div>

                            <div id="registerAlert" class="alert alert-success d-none" role="alert"></div>

                            <form id="registerForm" class="needs-validation" novalidate>
                                <div class="mb-3">
                                    <label for="registerEmail" class="form-label fw-semibold">Email</label>
                                    <input type="email" class="form-control form-control-lg" id="registerEmail" name="email" placeholder="tenban@example.com" required>
                                    <div class="invalid-feedback">Vui lòng nhập email hợp lệ.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="registerPassword" class="form-label fw-semibold">Mật khẩu</label>
                                    <div class="input-group input-group-lg">
                                        <input type="password" class="form-control" id="registerPassword" name="password" placeholder="Nhập mật khẩu" required minlength="6">
                                        <button type="button" class="btn btn-outline-secondary toggle-password" data-target="registerPassword" aria-label="Hiện hoặc ẩn mật khẩu">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                        <div class="invalid-feedback">Mật khẩu phải có ít nhất 6 ký tự.</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label fw-semibold">Xác nhận mật khẩu</label>
                                    <div class="input-group input-group-lg">
                                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required minlength="6">
                                        <button type="button" class="btn btn-outline-secondary toggle-password" data-target="confirmPassword" aria-label="Hiện hoặc ẩn mật khẩu xác nhận">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                        <div class="invalid-feedback">Mật khẩu xác nhận phải trùng khớp.</div>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-dark-blue btn-lg w-100 rounded-pill">Đăng ký</button>

                                <div class="text-center mt-4">
                                    <span class="text-secondary">Đã có tài khoản?</span>
                                    <a href="login.html" class="fw-semibold text-decoration-none">Đăng nhập ngay</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
