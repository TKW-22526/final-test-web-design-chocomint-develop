<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/chi-tiet.css">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>

       <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">   
                        <a class="nav-link active" href="index.html">Trang Chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#products-section">Sản Phẩm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about-section">Giới Thiệu</a>
                    </li> 
                    <li class="nav-item">
                        <a class="nav-link" href="#contact-section">Liên Hệ</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="#" class="btn btn-accent rounded-pill px-4 shadow-sm text-dark-blue d-flex align-items-center">
                            <i class="bi bi-cart3 me-2"></i> Giỏ Hàng
                        </a>
                    </li>   
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="../index.html">Trang chủ</a></li>
        <li class="breadcrumb-item active" id="breadcrumb-name">Chi tiết sản phẩm</li>
        </ol>
    </nav>

    <div id="detail-content" class="row g-4">
        <!-- Nội dung sản phẩm được render bằng JavaScript -->
    </div>

    <div class="mt-4">
        <a href="../index.html" class="btn btn-outline-dark rounded-pill">&larr; Quay lại danh sách</a>
    </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function formatVND(n){ return n.toLocaleString('vi-VN'); }

    // Lấy id sản phẩm từ query string, ví dụ product-detail.html?id=2
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    // Đọc danh sách sản phẩm đã lưu từ trang shop.html
    const products = JSON.parse(localStorage.getItem('products') || '[]');
    const product = products[id];

    const container = document.getElementById('detail-content');

    if (product){
    document.title = product.name + " - IoTShop";
    document.getElementById('breadcrumb-name').textContent = product.name;

    container.innerHTML = `
        <div class="col-12 col-md-5">
        <div class="product-img-box">
            <img src="../${product.img}" alt="${product.name}">
        </div>
        </div>
        <div class="col-12 col-md-7">
        <span class="badge badge-model text-white mb-2 d-inline-block">${product.model}</span>
        <h2 class="fw-bold" style="color:#0d1b3e">${product.name}</h2>
        <p class="text-muted">${product.desc}</p>
        <p class="product-price price-tag mb-4">${formatVND(product.price)}</p>
        <button class="btn btn-black">Thêm vào giỏ hàng</button>
        </div>
    `;
    } else {
    container.innerHTML = `<div class="col-12"><p class="text-danger">Không tìm thấy sản phẩm.</p></div>`;
    }
</script>
</body>
</html>
